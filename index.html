<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Última Librería - Administración Completa</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos_principal.css">
</head>
<body>

<div id="viewport">
    <div id="col-izq">
        <div class="card" style="text-align:center">
            <img src="tester2.png" alt="Logo" style="width: 180px; margin-bottom: 10px;">
            <div class="row-2">
                <select id="envSelector" onchange="cambiarEntorno()"><option value="desktop">🖥️ Desktop</option><option value="iphone">📱 iPhone</option></select>
            </div>
        </div>

        <div class="card">
            <h3>📥 Valuador e Ingreso</h3>
            <div class="row-2" style="margin-bottom: 15px;">
                <div id="photo-preview" style="width: 100%; height: 120px; border: 2px dashed #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #eee; overflow: hidden;">
                    <small id="placeholder-text">Sin foto</small>
                    <img id="img-render" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                </div>
                <div style="display: flex; flex-direction: column; justify-content: center;">
                    <label class="btn" style="background: #555; color: white; font-size: 0.7rem; text-align: center;">
                        Cargar Portada
                        <input type="file" id="foto-input" accept="image/*" onchange="previewImage(this)" style="display: none;">
                    </label>
                    <small style="font-size: 0.6rem; color: #666; margin-top: 5px;">Afecta el valor visual en el OPAC</small>
                </div>
            </div>
            <input type="text" id="titulo" placeholder="Título" style="margin-bottom:10px">
            <div class="row-2">
                <input type="text" id="autor" placeholder="Autor">
                
            </div>
            <div class="row-2"><input type="text" id="editorial" placeholder="Editorial"></div>
            <div class="row-2">
                <input type="text" id="isbn" placeholder="ISBN (10 o 13 dígitos)">
                <select id="genero">
                    <option value="Sin Categoría">Seleccionar Género</option>
                    <option value="Horror">Horror / Terror</option>
                    <option value="Ciencia Ficción">Ciencia Ficción</option>
                    <option value="Literatura Clásica">Literatura Clásica</option>
                    <option value="Divulgación">Divulgación</option>
                    <option value="Ensayo / Crítica">Ensayo / Crítica</option>
                    <option value="Fantasía">Fantasía</option>
                    <option value="Misterio / Policiaco">Misterio / Policiaco</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <input type="text" id="coleccion" placeholder="Colección (ej: Gótica, El Club del Misterio, Gran Super-Ficción)">
            </div>
            <div class="row-3">
                <input type="number" id="paginas" placeholder="Págs">
                <input type="number" id="estado" placeholder="Est. (0-10)">
                <input type="number" id="anio" placeholder="Año">
            </div>
            <div class="row-2">
                <select id="pasta"><option value="Blanda">Pasta Blanda</option><option value="Dura">Pasta Dura</option></select>
                <select id="condicion"><option value="Segunda mano">2da mano</option><option value="Nuevo">Nuevo</option><option value="Restaurado">Restaurado</option></select>
            </div>
            <div class="row-2">
                <select id="edicion"><option value="Reedición">Reedición</option><option value="1ra Edición">1ra Edición</option></select>
                <label style="font-size:0.7rem; display:flex; align-items:center"><input type="checkbox" id="sobrecubierta"> Sobrecubierta</label>
            </div>
            
            <textarea id="comentarios" placeholder="Testigos (ej: un solo dueño), marcas o restauración..." style="height:60px"></textarea>

            <div class="multiplicadores">
                <small style="display:block; margin-bottom:5px; color:#c0392b; font-weight:bold">FACTORES DE VALOR:</small>
                <div class="row-3">
                    <label style="font-size:0.65rem"><input type="checkbox" id="importado"> ✈️ Importado</label>
                    <label style="font-size:0.65rem"><input type="checkbox" id="popular"> 🔥 Popular</label>
                    <label style="font-size:0.65rem"><input type="checkbox" id="raro"> 💎 Raro</label>
                </div>
            </div>

            <div class="row-2">
                <input type="number" id="costo" placeholder="Costo $">
                <input type="number" id="envio_in" placeholder="Envío $">
            </div>
            <div class="row-3">
                <label style="font-size:0.65rem">Margen %<input type="number" id="margen" value="40"></label>
                <!--
                <label style="font-size:0.65rem">Plat. %<input type="number" id="comision" value="0"></label>
                <label style="font-size:0.65rem">TC % 3.5<input type="number" id="comision_tc" value="0"></label>
                -->
            </div>

            <button class="btn btn-p" onclick="preCalcular()">1. Calcular Precios</button>

            <div id="preViewArea" class="pre-view" style="display:none;">
                <div class="row-2">
                    <!--<div><small>SUGERIDO</small><br><strong id="vSugerido" style="font-size:1.4rem;"></strong></div>-->
                    <div><small>SUGERIDO</small><br>
                        <input type="number" id="vSugeridoInput">
                    </div>

                    <div><small>MÍNIMO</small><br><strong id="vMinimo" style="color:var(--err); font-size:1.1rem;"></strong></div>
                </div>
                <button class="btn btn-s" onclick="guardarEnInventario()">2. Confirmar a Inventario</button>
                    <!-- Indicador de carga (oculto por defecto) -->
                <div id="loadingStatus" style="display: none; align-items: center; gap: 10px; color: var(--s); font-weight: bold; margin-bottom: 10px;">
                    <span class="dot-flashing"></span> 
                    <span id="loadingText">Enviando a la nube...</span>
                </div>
            </div>
        </div>
    </div>

    <div id="col-der">
        <div class="stats-grid">
            <div class="stat-card"><small>Estante</small><b id="statEstante">0</b></div>
            <div class="stat-card"><small>Ganancia</small><b id="statGanancia" style="color:var(--s)">$0</b></div>
            <div class="stat-card"><small>Comis.</small><b id="statComisiones" style="color:var(--err)">$0</b></div>
            <div class="stat-card"><small>Anterior</small><b id="statMesPasado">$0</b></div>
        </div>

        <div class="card">
            <h3>📦 Inventario Activo</h3>
            <input type="text" id="filtro" placeholder="🔍 Filtrar por título, autor o editorial..." onkeyup="render()" style="margin-bottom:15px">
            <div class="scroll-area">
                <table id="tablaInv">
                    <thead><tr><th>Libro</th><th>Portada</th><th>Info Bibliográfica</th><th>Inversión</th><th>Sugerido</th><th>Mínimo</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h3>💰 Historial de Ventas</h3>
            <div class="scroll-area">
                <table id="tablaVentas">
                    <thead><tr><th>Fecha</th><th>Libro</th><th>Venta</th><th>Neta</th><th>Com.</th><th>Pago</th><th>Días</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="row-2" style="margin-top:15px">
                <button class="btn" style="background:#eee" onclick="exportarCSV('inventario')">Excel Inv.</button>
                <button class="btn" style="background:#eee" onclick="exportarCSV('ventas')">Excel Ventas</button>
            </div>
            <button class="btn" style="background:var(--err); color:white" onclick="cierreMensual()">🔒 CIERRE DE MES</button>
        </div>
    </div>
</div>

<script src="controlador.js"> </script>

</body>
</html>
